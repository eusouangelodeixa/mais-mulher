services:
  db:
    image: postgres:16-alpine
    container_name: mais-mulher-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maismulher
      POSTGRES_PASSWORD: maismulher
      POSTGRES_DB: maismulher
    ports:
      - "5433:5432"
    volumes:
      - mm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maismulher"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mm_pgdata:
